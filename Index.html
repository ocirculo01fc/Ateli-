    <style>

  #produtos {
    display: grid;

    background:

  .grupo-botoes {

  .grupo-botoes button {
  
    flex: 1;

  #trocoValor {

  #campoLocalizacao input {

  @keyframes subirModal {

      transform: translateY(0);

  <body>

    <div id="categorias">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
  const SUPABASE_URL = "https://kmvbihhgjguesfngqsbm.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttdmJpaGhnamd1ZXNmbmdxc2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODMyMzAsImV4cCI6MjA5MjU1OTIzMH0.WZXVkObmrRrIn76UwTpqCO0D2nPR2Ke3OFvVs_zFiWk";
  
  const supabaseC = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );
    
  let listaProdutos = [];
  let carrinho = [];
  
  
  async function carregarProdutos(categoria = null) {
    const container = document.getElementById("produtos");
  
    if (!container) {
      console.error("❌ #produtos não encontrado no HTML");
      return;
    }
  
    try {
      container.innerHTML = `
        <p style="text-align:center;padding:40px;">
          Carregando produtos...
        </p>
      `;
  
      let query = supabaseC
        .from("produtos")
        .select("*")
        .order("id", { ascending: false });
  
      if (categoria) {
        query = query.eq("categoria", categoria);
      }
  
      const { data, error } = await query;
  
      if (error) {
        console.error("Erro Supabase:", error);
        throw error;
      }
  
      listaProdutos = data || [];
  
      container.innerHTML = "";
  
      if (!listaProdutos.length) {
        container.innerHTML = `
          <p style="text-align:center;padding:40px;">
            Nenhum produto encontrado.
          </p>
        `;
        return;
      }
  
      const fragment = document.createDocumentFragment();
  
      listaProdutos.forEach((prod, i) => {
        const nome = prod.nome || "Sem nome";
        const desc = prod.descricao || "";
        const preco = parseFloat(prod.preco || 0).toFixed(2);
        const img = prod.img || "https://via.placeholder.com/300";
        const estoque = Number(prod.estoque || 0);
  
        const div = document.createElement("div");
        div.className = "produto";
  
        if (estoque > 0) {
          div.onclick = () => abrirModal(i);
        } else {
          div.style.opacity = "0.5";
        }
  
        let estoqueHTML = "";
  
        if (estoque > 0 && estoque <= 3) {
          estoqueHTML = `<span style="color:orange;font-size:12px;">⚠️ Últimas ${estoque}</span>`;
        } else if (estoque > 0) {
          estoqueHTML = `<span style="color:green;font-size:12px;">🟢 ${estoque} disponível</span>`;
        } else {
          estoqueHTML = `<span style="color:red;font-size:12px;">🔴 Esgotado</span>`;
        }
  
        div.innerHTML = `
          <img src="${img}" alt="${nome}">
          <div class="produto-info">
            <h5>${nome}</h5>
            <h6>${desc}</h6>
            ${estoqueHTML}
            <h3>R$ ${preco}</h3>
          </div>
        `;
  
        fragment.appendChild(div);
      });
  
      container.appendChild(fragment);
  
    } catch (erro) {
      container.innerHTML = `
        <p style="text-align:center;color:#e91e63;padding:40px;">
          ⚠️ Erro ao carregar produtos.
        </p>
      `;
    }
  }
  
  function abrirModal(index) {
    const prod = listaProdutos[index];
  
    if (!prod) return;
  
    document.getElementById("modalImg").src = prod.img || "";
    document.getElementById("modalNome").textContent = prod.nome || "";
    document.getElementById("modalDesc").textContent = prod.descricao || "";
  
    const container = document.getElementById("listaSabores");
    container.innerHTML = "";
  
    let variacoes = prod.variacoes || prod.sabores || [];
  
    if (typeof variacoes === "string") {
      variacoes = variacoes.split(",").map(v => v.trim());
    }
  
  if (variacoes.length > 0) {
    
    variacoes.forEach(v => {
      
      const div = document.createElement("div");
      div.className = "sabor-item";
      
      const span = document.createElement("span");
      span.textContent = v;
      
      const btn = document.createElement("button");
      btn.textContent = "+";
      
      btn.onclick = (e) => {
        e.stopPropagation();
        
        const personalizacao =
          document.getElementById("inputPersonalizacao")?.value || "";
        
        addAoCarrinho(index, v, btn, personalizacao);
      };
      
      div.appendChild(span);
      div.appendChild(btn);
      
      container.appendChild(div);
    });
    
  } else {
    
    const div = document.createElement("div");
    div.className = "sabor-item";
    
    const span = document.createElement("span");
    span.textContent = "Peça padrão";
    
    const btn = document.createElement("button");
    btn.textContent = "+";
    
    btn.onclick = (e) => {
      e.stopPropagation();
      
      const personalizacao =
        document.getElementById("inputPersonalizacao")?.value || "";
      
      addAoCarrinho(index, "Padrão", btn, personalizacao);
    };
    
    div.appendChild(span);
    div.appendChild(btn);
    
    container.appendChild(div);
  }
  
    const box = document.createElement("div");
    box.style.marginTop = "15px";
  
    box.innerHTML = `
      <label style="font-size:14px;font-weight:600;">
        ✍️ Personalização (opcional)
      </label>
      <input 
        type="text" 
        id="inputPersonalizacao"
        placeholder="Ex: Nome, cor, frase..."
        style="width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-top:5px;"
      >
    `;
  
    container.appendChild(box);
  
    document.getElementById("modalInfo").style.display = "flex";
  }
  
  
  function fecharModal() {
    document.getElementById("modalInfo").style.display = "none";
  }
  
  
  function addAoCarrinho(index, variacao, btn, personalizacao = "") {
    const prod = listaProdutos[index];
    if (!prod) return;
  
    const carrinhoIcon = document.getElementById("carrinho");
    const imgOrigem = document.getElementById("modalImg");
  
    if (btn) btn.disabled = true;
  
    const preco = typeof prod.preco === "number"
      ? prod.preco
      : parseFloat(String(prod.preco || 0).replace(",", "."));
  
    const variacaoSelecionada = variacao || "Padrão";
    const personal = personalizacao?.trim() || "";
  
    // 🔥 Controle de estoque
    if (prod.estoque !== undefined && prod.estoque !== null) {
      if (prod.estoque <= 0) {
        alert("Produto esgotado!");
        if (btn) btn.disabled = false;
        return;
      }
  
      prod.estoque--;
    }
  
    const item = {
      nome: prod.nome,
      variacao: variacaoSelecionada,
      preco: preco,
      img: prod.img,
      personalizacao: personal
    };
  
    // 🔥 fallback sem animação
    if (!imgOrigem || !carrinhoIcon) {
      carrinho.push(item);
      atualizarCarrinho();
      fecharModal();
      return;
    }
  
    // 🔥 animação
    const imgClone = imgOrigem.cloneNode(true);
    const rectStart = imgOrigem.getBoundingClientRect();
    const rectEnd = carrinhoIcon.getBoundingClientRect();
  
    Object.assign(imgClone.style, {
      position: "fixed",
      top: rectStart.top + "px",
      left: rectStart.left + "px",
      width: rectStart.width + "px",
      height: rectStart.height + "px",
      borderRadius: "18px",
      zIndex: "99999",
      transition: "all 0.6s cubic-bezier(0.4, 0, 0.2, 1)",
      pointerEvents: "none"
    });
  
    document.body.appendChild(imgClone);
  
    requestAnimationFrame(() => {
      Object.assign(imgClone.style, {
        top: (rectEnd.top + 10) + "px",
        left: (rectEnd.left + 10) + "px",
        width: "40px",
        height: "40px",
        opacity: "0.6",
        borderRadius: "50%"
      });
    });
  
    setTimeout(() => {
      imgClone.remove();
  
      carrinho.push(item);
      atualizarCarrinho();
  
      if (btn) {
        btn.disabled = false;
        btn.textContent = "✓";
        setTimeout(() => (btn.textContent = "+"), 800);
      }
  
    }, 600);
  
    fecharModal();
  }
  
  
  function atualizarCarrinho() {
    const icon = document.getElementById("carrinho");
    icon.setAttribute("data-qtd", carrinho.length);
    
    icon.classList.add("pulse");
    setTimeout(() => icon.classList.remove("pulse"), 600);
  }
  
  
  function abrirCarrinho() {
    
    const container = document.getElementById("itensCar");
    const resumo = document.getElementById("resumoCar");
    
    if (!container || !resumo) return;
    
    container.innerHTML = "";
    
    let total = 0;
  
    if (carrinho.length === 0) {
      container.innerHTML = `
        <p style="text-align:center;padding:30px;color:#777;">
          🧺 Seu carrinho está vazio
        </p>
      `;
      resumo.innerHTML = "";
      document.getElementById("listaCar").style.display = "flex";
      return;
    }
    
    carrinho.forEach((item, index) => {
      
      const preco = typeof item.preco === "number" ?
        item.preco :
        parseFloat(String(item.preco || 0).replace(",", "."));
      
      total += preco;
      
      const div = document.createElement("div");
      div.className = "item-car";
      
      div.innerHTML = `
        <img src="${item.img || "https://via.placeholder.com/100"}" alt="${item.nome}">
        
        <div class="item-info">
          <div style="font-weight:600;">${item.nome}</div>
  
          <div style="font-size:12px;color:#777;">
            ${item.variacao ? "🎨 " + item.variacao : ""}
          </div>
  
          <div style="font-size:12px;color:#555;">
            ${item.personalizacao ? "📝 " + item.personalizacao : ""}
          </div>
        </div>
  
        <div style="font-weight:600; color:#e91e63;">
          R$ ${preco.toFixed(2)}
        </div>
  
        <button 
          onclick="removerItem(${index}); event.stopPropagation()"
          style="background:none;border:none;font-size:20px;cursor:pointer;">
          ×
        </button>
      `;
      
      container.appendChild(div);
    });
    
    resumo.innerHTML = `
  
      <strong>Itens:</strong> ${carrinho.length}<br>
      <strong>Total:</strong> R$ ${total.toFixed(2)}
  
      <br><br>
  
      <strong>Entrega ou retirada:</strong><br>
  
      <div class="grupo-botoes">
        <button onclick="selecionarEntrega('retirada')" id="btnRetirada">
          🏪 Retirada
        </button>
  
        <button onclick="selecionarEntrega('entrega')" id="btnEntrega">
          🚚 Entrega
        </button>
      </div>
  
      <div id="campoLocalizacao" style="display:none;margin-top:10px;">
        <input 
          type="text" 
          id="enderecoCliente" 
          placeholder="Digite seu endereço..."
        >
      </div>
  
      <br>
  
      <strong>Forma de pagamento:</strong><br>
  
      <div class="grupo-botoes">
  
        <button onclick="selecionarPagamento('pix')" id="btnPix">
          Pix
        </button>
  
        <button onclick="selecionarPagamento('cartao')" id="btnCartao">
          Cartão
        </button>
  
        <button onclick="selecionarPagamento('dinheiro')" id="btnDinheiro">
          Dinheiro
        </button>
  
      </div>
  
      <div id="campoTroco" style="display:none;margin-top:10px;">
        Precisa de troco para quanto?<br>
        <input type="text" id="trocoValor">
      </div>
  
    `;
    
    document.getElementById("listaCar").style.display = "flex";
  }
  
  let tipoEntrega = "";
  let formaPagamento = "";
  
  function selecionarEntrega(tipo) {
    
    tipoEntrega = tipo;
    
    const btnRetirada = document.getElementById("btnRetirada");
    const btnEntrega = document.getElementById("btnEntrega");
    const campoEndereco = document.getElementById("campoLocalizacao");
    
    if (btnRetirada) btnRetirada.classList.remove("ativo");
    if (btnEntrega) btnEntrega.classList.remove("ativo");
    
    if (tipo === "retirada") {
      btnRetirada.classList.add("ativo");
      campoEndereco.style.display = "none";
    } else {
      btnEntrega.classList.add("ativo");
      campoEndereco.style.display = "block";
    }
  }
  
  
  function selecionarPagamento(tipo) {
    
    formaPagamento = tipo;
    
    const btnPix = document.getElementById("btnPix");
    const btnCartao = document.getElementById("btnCartao");
    const btnDinheiro = document.getElementById("btnDinheiro");
    const campoTroco = document.getElementById("campoTroco");
    
    if (btnPix) btnPix.classList.remove("ativo");
    if (btnCartao) btnCartao.classList.remove("ativo");
    if (btnDinheiro) btnDinheiro.classList.remove("ativo");
    
    if (tipo === "pix") {
      btnPix.classList.add("ativo");
    } else if (tipo === "cartao") {
      btnCartao.classList.add("ativo");
    } else {
      btnDinheiro.classList.add("ativo");
    }
    if (campoTroco) {
      campoTroco.style.display = tipo === "dinheiro" ? "block" : "none";
    }
  }
  
  
  function fecharCarrinho() {
    document.getElementById("listaCar").style.display = "none";
  }
  
  function removerItem(index) {
    carrinho.splice(index, 1);
    abrirCarrinho();     
    atualizarCarrinho(); 
  }
  function enviarWhats() {

      msg += `• ${item.nome}\n`;
      
if (item.variacao) {
  msg += `• Variação: ${item.variacao}\n`;
}
      
      msg += `• Valor: R$ ${preco.toFixed(2)}\n\n`;
    });
    
    msg += `━━━━━━━━━━━━━━━\n`;
    msg += `📋 *Resumo do Pedido*\n\n`;
    
    msg += `📦 Tipo: ${
      tipoEntrega === "entrega" ? "Entrega" : "Retirada"
    }\n`;
    
    msg += `💳 Pagamento: ${
      formaPagamento === "pix"
        ? "Pix"
        : formaPagamento === "cartao"
        ? "Cartão"
        : "Dinheiro"
    }\n`;
    
    if (formaPagamento === "dinheiro" && troco) {
      msg += `💵 Troco para: R$ ${troco}\n`;
    }
    
    if (tipoEntrega === "entrega") {
      msg += `\n📍 *Endereço para entrega:*\n${endereco}\n`;
    }
    
    msg += `\n📅 *Informe o melhor dia e horário para entrega*\n`;
    
    msg += `━━━━━━━━━━━━━━━\n`;
    msg += `💰 *Total: R$ ${total.toFixed(2)}*\n\n`;
    
    msg += `💛 Obrigado por escolher o *Ana Ateliê!*`;
    
    const numero = "5583989022424";
    
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;
    
    window.open(url, "_blank");
  }
  
  document.getElementById("modalInfo").addEventListener("click", function(e) {
    if (e.target === this) fecharModal();
  });
  
  window.onload = () => {
    carregarProdutos(); 
  };
  </script>
